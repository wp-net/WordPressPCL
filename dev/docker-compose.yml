services:
  db:
    image: mariadb:11.4
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  wordpress:
    depends_on:
      db:
        condition: service_healthy
    build:
      context: .
    image: wordpress-custom
    volumes:
      - wp-volume:/var/www/html
    ports:
      - "8080:80"
    container_name: wordpress
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG}
      WORDPRESS_CONFIG_EXTRA: define('JWT_AUTH_SECRET_KEY', '.|)WaUppb-a>Z;(%p,4~^|5jjWom6Gw{(2_lqJv9r&]p<r4=rAvjM(LepuRf&+wI');
    restart: unless-stopped

  cli:
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    image: wordpress-custom
    user: 33:33
    container_name: wp-cli
    volumes:
      - wp-volume:/var/www/html
      - ./init-wordpress.sh:/usr/local/bin/init-wordpress.sh:ro
    env_file:
      - .env
    restart: on-failure
    command: ["/bin/sh", "/usr/local/bin/init-wordpress.sh"]

volumes: 
  wp-volume:

networks:
  default:
    name: net1
